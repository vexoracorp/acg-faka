services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "8529:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: acg_faka
      MYSQL_USER: acg_faka
      MYSQL_PASSWORD: acg_faka_password_change_me
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "37743:3306"

volumes:
  db_data:
